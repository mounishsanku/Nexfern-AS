version: "3.9"

# Nexfern FinanceOS — Docker Compose (development + staging)
# Production: use docker-compose.prod.yml with secrets management.

services:
  mongo:
    image: mongo:7.0
    container_name: nexfern_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: nexfern
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nexfern_server
    restart: unless-stopped
    ports:
      - "${PORT:-5001}:${PORT:-5001}"
    env_file:
      - ./server/.env
    environment:
      NODE_ENV: production
      MONGODB_URI: mongodb://mongo:27017/nexfern
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:${PORT:-5001}/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    volumes:
      - uploads_data:/app/server/uploads

  # Redis — placeholder for future rate-limiting / queue scaling.
  # Uncomment when migrating from in-process rate limiter.
  # redis:
  #   image: redis:7-alpine
  #   container_name: nexfern_redis
  #   restart: unless-stopped
  #   ports:
  #     - "6379:6379"

volumes:
  mongo_data:
    driver: local
  uploads_data:
    driver: local
